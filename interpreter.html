<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;WYYYES Interpreter&quot;,&quot;short_name&quot;:&quot;통역&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%23f8fafc&quot;,&quot;theme_color&quot;:&quot;%23f8fafc&quot;}">
<title>WYYYES 일본 영업 미팅 통역 에이전트</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f8fafc;--card:#ffffff;--card-border:#e2e8f0;--card-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --text:#1e293b;--muted:#94a3b8;--muted2:#64748b;
  --kr:#2563eb;--kr-light:#eff6ff;--kr-border:#bfdbfe;
  --jp:#dc2626;--jp-light:#fef2f2;--jp-border:#fecaca;
  --accent:#0d9488;--accent-light:#f0fdfa;--accent-border:#99f6e4;
  --warn:#f59e0b;--radius:16px;--radius-sm:10px
}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{max-width:1100px;margin:0 auto;padding:20px}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);margin-bottom:20px;box-shadow:var(--card-shadow);flex-wrap:wrap;gap:12px}
.header-left{display:flex;align-items:center;gap:10px}
.header-left h1{font-size:20px;font-weight:800;color:var(--text)}
.header-left h1 span{background:linear-gradient(135deg,var(--kr),var(--jp));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badge{font-size:9px;padding:3px 8px;border-radius:20px;background:var(--accent-light);color:var(--accent);font-weight:700;letter-spacing:1.5px;border:1px solid var(--accent-border)}
.header-right{display:flex;align-items:center;gap:8px}
.api-input{background:var(--bg);border:1.5px solid var(--card-border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:13px;width:280px;outline:none;transition:.2s}
.api-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(13,148,136,.1)}
.api-input::placeholder{color:var(--muted)}
.btn{padding:10px 18px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.btn-connect{background:var(--accent);color:#fff}
.btn-connect:hover{background:#0f766e}
.btn-connect.connected{background:#16a34a}
.status-dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1;flex-shrink:0}
.status-dot.ok{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.4)}
.status-dot.err{background:var(--jp);box-shadow:0 0 8px rgba(220,38,38,.4)}
.status-dot.loading{background:var(--warn);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Settings */
.settings-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;padding:14px 18px;background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);box-shadow:var(--card-shadow)}
.settings-bar select{background:var(--bg);border:1.5px solid var(--card-border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:12px;outline:none;min-width:160px;cursor:pointer}
.settings-bar select:focus{border-color:var(--accent)}
.setting-group{display:flex;align-items:center;gap:6px}
.setting-group label{font-size:11px;color:var(--muted2);white-space:nowrap;font-weight:600}
.setting-group input[type=range]{width:80px;accent-color:var(--accent)}
.setting-group .val{font-size:11px;color:var(--muted);min-width:28px}

/* Main Grid */
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}

/* Speaker Panel */
.panel{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:24px;display:flex;flex-direction:column;align-items:center;gap:16px;box-shadow:var(--card-shadow);transition:.2s}
.panel.kr{border-top:4px solid var(--kr)}
.panel.jp{border-top:4px solid var(--jp)}
.panel-head{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700}
.panel-head .flag{font-size:28px}

/* Mic Button */
.mic-btn{width:80px;height:80px;border-radius:50%;border:2.5px solid var(--card-border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;position:relative}
.mic-btn:hover{background:#f1f5f9;transform:scale(1.05)}
.mic-btn:active{transform:scale(0.95)}
.mic-btn svg{width:32px;height:32px;fill:var(--muted);transition:.2s}
.kr .mic-btn.recording{border-color:var(--kr);background:var(--kr-light);animation:pulse-kr 1.5s infinite}
.kr .mic-btn.recording svg{fill:var(--kr)}
.jp .mic-btn.recording{border-color:var(--jp);background:var(--jp-light);animation:pulse-jp 1.5s infinite}
.jp .mic-btn.recording svg{fill:var(--jp)}
@keyframes pulse-kr{0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,.3)}50%{box-shadow:0 0 0 16px rgba(37,99,235,0)}}
@keyframes pulse-jp{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.3)}50%{box-shadow:0 0 0 16px rgba(220,38,38,0)}}
.mic-hint{font-size:12px;color:var(--muted);font-weight:500}

/* Text Boxes */
.text-box{width:100%;border-radius:var(--radius-sm);padding:14px;font-size:14px;line-height:1.7;min-height:64px;max-height:140px;overflow-y:auto}
.text-box::-webkit-scrollbar{width:4px}
.text-box::-webkit-scrollbar-thumb{background:var(--card-border);border-radius:2px}
.transcript{background:var(--bg);border:1.5px solid var(--card-border)}
.translation{border:1.5px solid var(--card-border)}
.kr .translation{background:var(--jp-light);border-color:var(--jp-border)}
.jp .translation{background:var(--kr-light);border-color:var(--kr-border)}
.box-label{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:700}
.interim{color:var(--muted);font-style:italic}
.placeholder-text{color:var(--muted);font-style:italic;font-size:13px}

/* Audio indicator */
.audio-playing{display:none;align-items:center;gap:6px;font-size:12px;color:var(--accent);font-weight:600}
.audio-playing.active{display:flex}
.audio-bars{display:flex;gap:2px;align-items:flex-end;height:16px}
.audio-bars span{width:3px;background:var(--accent);border-radius:1px;animation:bar .6s infinite ease-in-out}
.audio-bars span:nth-child(1){animation-delay:0s;height:6px}
.audio-bars span:nth-child(2){animation-delay:.15s;height:12px}
.audio-bars span:nth-child(3){animation-delay:.3s;height:4px}
.audio-bars span:nth-child(4){animation-delay:.45s;height:14px}
@keyframes bar{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.3)}}

/* Log */
.log-section{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--card-shadow)}
.log-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--card-border);background:var(--bg)}
.log-head h2{font-size:15px;font-weight:700}
.log-actions{display:flex;gap:6px}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;border:1.5px solid var(--card-border);background:var(--card);color:var(--muted2);cursor:pointer;transition:.2s;font-weight:600}
.btn-sm:hover{background:var(--bg);border-color:var(--accent);color:var(--accent)}
.log-body{max-height:260px;overflow-y:auto;padding:10px}
.log-body::-webkit-scrollbar{width:4px}
.log-body::-webkit-scrollbar-thumb{background:var(--card-border);border-radius:2px}
.log-entry{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);margin-bottom:6px;animation:fadeIn .3s;font-size:13px;line-height:1.6;background:var(--bg)}
.log-entry.kr-entry{border-left:3px solid var(--kr)}
.log-entry.jp-entry{border-left:3px solid var(--jp)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.log-time{color:var(--muted);font-size:11px;font-family:'SF Mono',monospace;white-space:nowrap;min-width:56px}
.log-speaker{font-size:16px}
.log-text{flex:1}
.log-original{color:var(--text);font-weight:500}
.log-arrow{color:var(--accent);margin:0 8px;font-size:12px;font-weight:700}
.log-translated{color:var(--muted2)}
.log-empty{text-align:center;color:var(--muted);padding:32px;font-size:13px}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;padding:14px 22px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;z-index:999;animation:fadeIn .3s;max-width:400px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.toast.error{background:#fff1f2;border:1px solid #fecdd3;color:#be123c}
.toast.success{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d}

/* Footer */
.footer{text-align:center;padding:16px;font-size:11px;color:var(--muted)}
.footer a{color:var(--accent);text-decoration:none;font-weight:600}

/* ===== MOBILE RESPONSIVE ===== */
@media(max-width:768px){
  .app{padding:10px}
  .header{padding:12px 16px;gap:10px;flex-direction:column;align-items:stretch;border-radius:var(--radius-sm)}
  .header-left{justify-content:center}
  .header-left h1{font-size:17px}
  .header-right{flex-direction:column;align-items:stretch}
  .api-input{width:100%;font-size:16px;padding:12px 14px}
  .btn-connect{padding:12px 20px;font-size:15px;width:100%}
  .settings-bar{gap:8px;padding:12px;border-radius:var(--radius-sm)}
  .settings-bar select{min-width:100%;font-size:14px;padding:10px}
  .setting-group{width:100%}
  .setting-group label{font-size:12px}
  .setting-group input[type=range]{flex:1;width:100%}
  .main-grid{grid-template-columns:1fr;gap:14px}
  .panel{padding:20px 16px;gap:14px;border-radius:var(--radius-sm)}
  .mic-btn{width:96px;height:96px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .mic-btn svg{width:40px;height:40px}
  .mic-hint{font-size:14px}
  .text-box{font-size:15px;padding:12px;min-height:56px;max-height:110px}
  .box-label{font-size:12px}
  .log-section{border-radius:var(--radius-sm);margin-bottom:16px}
  .log-body{max-height:200px}
  .log-entry{font-size:12px;gap:8px;padding:8px 10px}
  .toast{left:10px;right:10px;bottom:10px;text-align:center}
}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <h1><span>WYYYES</span> Meeting Interpreter</h1>
      <span class="badge">PROTOTYPE</span>
    </div>
    <div class="header-right">
      <input type="password" class="api-input" id="apiKey" placeholder="ElevenLabs API Key 입력">
      <button class="btn btn-connect" id="connectBtn">연결</button>
      <div class="status-dot" id="statusDot"></div>
    </div>
  </header>

  <!-- Settings -->
  <div class="settings-bar" id="settingsBar" style="display:none">
    <div class="setting-group">
      <label>🇰🇷 한국어 음성</label>
      <select id="voiceKR"></select>
    </div>
    <div class="setting-group">
      <label>🇯🇵 일본어 음성</label>
      <select id="voiceJP"></select>
    </div>
    <div class="setting-group">
      <label>안정성</label>
      <input type="range" id="stability" min="0" max="1" step="0.05" value="0.5">
      <span class="val" id="stabilityVal">0.50</span>
    </div>
    <div class="setting-group">
      <label>유사도</label>
      <input type="range" id="similarity" min="0" max="1" step="0.05" value="0.75">
      <span class="val" id="similarityVal">0.75</span>
    </div>
  </div>

  <!-- Main Panels -->
  <div class="main-grid">
    <!-- Korean Panel -->
    <section class="panel kr">
      <div class="panel-head"><span class="flag">🇰🇷</span> 한국어 화자</div>
      <button class="mic-btn" id="micKR">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
      <div class="mic-hint">탭하여 한국어로 말하기</div>
      <div class="audio-playing" id="audioKR"><div class="audio-bars"><span></span><span></span><span></span><span></span></div>음성 재생 중...</div>
      <div style="width:100%">
        <div class="box-label">인식된 텍스트</div>
        <div class="text-box transcript" id="transcriptKR"><span class="placeholder-text">마이크를 눌러 한국어로 말씀하세요...</span></div>
      </div>
      <div style="width:100%">
        <div class="box-label">🇯🇵 일본어 번역</div>
        <div class="text-box translation" id="translationKR"><span class="placeholder-text">번역 결과가 여기에 표시됩니다</span></div>
      </div>
    </section>

    <!-- Japanese Panel -->
    <section class="panel jp">
      <div class="panel-head"><span class="flag">🇯🇵</span> 日本語 話者</div>
      <button class="mic-btn" id="micJP">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
      <div class="mic-hint">タップして日本語で話す</div>
      <div class="audio-playing" id="audioJP"><div class="audio-bars"><span></span><span></span><span></span><span></span></div>音声再生中...</div>
      <div style="width:100%">
        <div class="box-label">認識テキスト</div>
        <div class="text-box transcript" id="transcriptJP"><span class="placeholder-text">マイクを押して日本語で話してください...</span></div>
      </div>
      <div style="width:100%">
        <div class="box-label">🇰🇷 한국어 번역</div>
        <div class="text-box translation" id="translationJP"><span class="placeholder-text">翻訳結果がここに表示されます</span></div>
      </div>
    </section>
  </div>

  <!-- Meeting Log -->
  <section class="log-section">
    <div class="log-head">
      <h2>📋 미팅 로그</h2>
      <div class="log-actions">
        <button class="btn-sm" id="copyLogBtn">복사</button>
        <button class="btn-sm" id="clearLogBtn">초기화</button>
      </div>
    </div>
    <div class="log-body" id="meetingLog">
      <div class="log-empty">미팅을 시작하면 대화 내역이 기록됩니다</div>
    </div>
  </section>

  <div class="footer">Powered by <a href="https://elevenlabs.io" target="_blank">ElevenLabs</a> &middot; WYYYES</div>
</div>

<script>
// ===== STATE =====
const S = {
  apiKey: '',
  voices: [],
  voiceKR: null,
  voiceJP: null,
  isRec: { kr: false, jp: false },
  recog: { kr: null, jp: null },
  log: [],
  stability: 0.5,
  similarity: 0.75,
  processing: false,
  currentAudio: null,
  connected: false
};

// ===== DOM =====
const $ = id => document.getElementById(id);
const apiKeyInput = $('apiKey');
const connectBtn = $('connectBtn');
const statusDot = $('statusDot');
const settingsBar = $('settingsBar');
const voiceKRSel = $('voiceKR');
const voiceJPSel = $('voiceJP');
const micKR = $('micKR');
const micJP = $('micJP');
const transcriptKR = $('transcriptKR');
const transcriptJP = $('transcriptJP');
const translationKR = $('translationKR');
const translationJP = $('translationJP');
const meetingLog = $('meetingLog');
const audioKR = $('audioKR');
const audioJP = $('audioJP');

// ===== CHECK BROWSER SUPPORT =====
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SpeechRecognition) {
  showToast('이 브라우저는 음성 인식을 지원하지 않습니다. Chrome을 사용해주세요.', 'error', 10000);
}

// ===== ELEVENLABS CONNECTION =====
async function connectAPI() {
  const key = apiKeyInput.value.trim();
  if (!key) { showToast('API 키를 입력해주세요', 'error'); return; }

  statusDot.className = 'status-dot loading';
  connectBtn.textContent = '연결 중...';

  try {
    const res = await fetch('https://api.elevenlabs.io/v1/voices', {
      headers: { 'xi-api-key': key }
    });
    if (!res.ok) throw new Error(res.status === 401 ? 'API 키가 유효하지 않습니다' : `오류: ${res.status}`);

    const data = await res.json();
    S.apiKey = key;
    S.voices = data.voices || [];
    S.connected = true;

    populateVoices();

    statusDot.className = 'status-dot ok';
    connectBtn.textContent = '연결됨 ✓';
    connectBtn.classList.add('connected');
    settingsBar.style.display = 'flex';
    localStorage.setItem('wyyyes_api_key', key);
    showToast(`연결 성공! ${S.voices.length}개 음성 로드`, 'success');
  } catch(e) {
    statusDot.className = 'status-dot err';
    connectBtn.textContent = '연결';
    S.connected = false;
    showToast(e.message, 'error');
  }
}

function populateVoices() {
  [voiceKRSel, voiceJPSel].forEach(sel => { sel.innerHTML = ''; });

  const sorted = [...S.voices].sort((a, b) => a.name.localeCompare(b.name));
  sorted.forEach(v => {
    voiceKRSel.add(new Option(v.name, v.voice_id));
    voiceJPSel.add(new Option(v.name, v.voice_id));
  });

  const krMatch = sorted.find(v => /korean|한국|서연|수빈/i.test(v.name + (v.labels?.description||'')));
  const jpMatch = sorted.find(v => /japan|日本|jp|yuki|hana/i.test(v.name + (v.labels?.description||'')));

  if (krMatch) voiceKRSel.value = krMatch.voice_id;
  if (jpMatch) voiceJPSel.value = jpMatch.voice_id;
  else if (sorted.length > 1) voiceJPSel.value = sorted[1].voice_id;

  S.voiceKR = voiceKRSel.value;
  S.voiceJP = voiceJPSel.value;
}

// ===== SPEECH RECOGNITION =====
function createRecognition(lang) {
  if (!SpeechRecognition) return null;
  const r = new SpeechRecognition();
  r.lang = lang;
  r.continuous = true;
  r.interimResults = true;
  r.maxAlternatives = 1;
  return r;
}

function toggleRec(panel) {
  const other = panel === 'kr' ? 'jp' : 'kr';
  if (S.isRec[other]) stopRec(other);
  if (S.isRec[panel]) { stopRec(panel); } else { startRec(panel); }
}

function startRec(panel) {
  // CRITICAL: Unlock audio during this user gesture so TTS can play later on mobile
  unlockAudio();

  const lang = panel === 'kr' ? 'ko-KR' : 'ja-JP';
  const mic = panel === 'kr' ? micKR : micJP;
  const transcript = panel === 'kr' ? transcriptKR : transcriptJP;

  if (S.recog[panel]) { try { S.recog[panel].abort(); } catch(e){} }

  const r = createRecognition(lang);
  if (!r) return;

  S.recog[panel] = r;
  S.isRec[panel] = true;
  mic.classList.add('recording');
  transcript.innerHTML = '<span class="interim">듣는 중...</span>';

  let finalText = '';

  r.onresult = (e) => {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) { final += t; } else { interim += t; }
    }

    if (final) {
      finalText += final;
      transcript.innerHTML = finalText;
      processUtterance(final.trim(), panel);
    } else if (interim) {
      transcript.innerHTML = (finalText ? finalText + ' ' : '') + '<span class="interim">' + interim + '</span>';
    }
  };

  r.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    console.error('Speech error:', e.error);
    if (e.error === 'not-allowed') {
      showToast('마이크 권한이 필요합니다. 브라우저 설정에서 허용해주세요.', 'error');
      stopRec(panel);
    }
  };

  r.onend = () => {
    if (S.isRec[panel]) {
      try { r.start(); } catch(e) { stopRec(panel); }
    }
  };

  try { r.start(); } catch(e) {
    showToast('음성 인식 시작 실패: ' + e.message, 'error');
    stopRec(panel);
  }
}

function stopRec(panel) {
  S.isRec[panel] = false;
  const mic = panel === 'kr' ? micKR : micJP;
  mic.classList.remove('recording');
  if (S.recog[panel]) {
    try { S.recog[panel].abort(); } catch(e){}
    S.recog[panel] = null;
  }
}

// ===== TRANSLATION =====
async function translateText(text, from, to) {
  const langPair = `${from}|${to}`;
  const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${langPair}`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.responseStatus === 200 && data.responseData) {
      return data.responseData.translatedText;
    }
    throw new Error('Translation failed');
  } catch(e) {
    try {
      const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
      const res = await fetch(proxyUrl);
      const data = await res.json();
      if (data.responseData) return data.responseData.translatedText;
    } catch(e2) {}
    showToast('번역 실패. 잠시 후 다시 시도해주세요.', 'error');
    return null;
  }
}

// ===== AUDIO CONTEXT (Mobile-safe autoplay unlock) =====
let audioCtx = null;
let audioUnlocked = false;

function ensureAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function unlockAudio() {
  const ctx = ensureAudioCtx();
  if (audioUnlocked && ctx.state === 'running') return;
  try {
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    src.onended = () => { audioUnlocked = true; };
    if (ctx.state === 'suspended') ctx.resume();
  } catch(e) { console.warn('Audio unlock failed:', e); }
}

['click','touchstart','touchend','keydown'].forEach(evt => {
  document.addEventListener(evt, unlockAudio, { passive: true });
});

// ===== TTS (ElevenLabs) =====
async function speakTTS(text, targetLang) {
  if (!S.connected || !S.apiKey) return;

  const voiceId = targetLang === 'ko' ? S.voiceKR : S.voiceJP;
  if (!voiceId) return;

  const audioIndicator = targetLang === 'ja' ? audioJP : audioKR;

  try {
    if (S.currentAudio) { try { S.currentAudio.stop(); } catch(e){} S.currentAudio = null; }

    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
      method: 'POST',
      headers: { 'xi-api-key': S.apiKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: text,
        model_id: 'eleven_multilingual_v2',
        voice_settings: { stability: S.stability, similarity_boost: S.similarity }
      })
    });

    if (!res.ok) {
      if (res.status === 401) showToast('API 키가 만료되었습니다', 'error');
      else if (res.status === 429) showToast('사용량 한도 초과. 잠시 후 다시 시도하세요', 'error');
      else showToast(`TTS 오류: ${res.status}`, 'error');
      return;
    }

    const ctx = ensureAudioCtx();
    if (ctx.state === 'suspended') await ctx.resume();
    const arrayBuf = await res.arrayBuffer();
    const audioBuf = await ctx.decodeAudioData(arrayBuf);

    audioIndicator.classList.add('active');

    await new Promise((resolve) => {
      const source = ctx.createBufferSource();
      source.buffer = audioBuf;
      source.connect(ctx.destination);
      S.currentAudio = source;

      source.onended = () => {
        audioIndicator.classList.remove('active');
        S.currentAudio = null;
        resolve();
      };

      source.start(0);
    });
  } catch(e) {
    audioIndicator.classList.remove('active');
    S.currentAudio = null;
    console.error('TTS error:', e);
    showToast('음성 합성 실패: ' + e.message, 'error');
  }
}

// ===== PIPELINE (Queue-based) =====
const utteranceQueue = [];
let queueRunning = false;

function processUtterance(text, sourcePanel) {
  if (!text) return;
  utteranceQueue.push({ text, sourcePanel });
  if (!queueRunning) runQueue();
}

async function runQueue() {
  if (utteranceQueue.length === 0) { queueRunning = false; return; }
  queueRunning = true;

  const { text, sourcePanel } = utteranceQueue.shift();
  const srcLang = sourcePanel === 'kr' ? 'ko' : 'ja';
  const tgtLang = sourcePanel === 'kr' ? 'ja' : 'ko';
  const translationBox = sourcePanel === 'kr' ? translationKR : translationJP;

  translationBox.innerHTML = '<span class="interim">번역 중...</span>';

  const translated = await translateText(text, srcLang, tgtLang);
  if (!translated) {
    translationBox.innerHTML = '<span style="color:var(--jp)">번역 실패</span>';
    runQueue();
    return;
  }

  translationBox.textContent = translated;
  addLogEntry(sourcePanel, text, translated);

  if (S.connected) {
    await speakTTS(translated, tgtLang);
  }

  runQueue();
}

// ===== MEETING LOG =====
function addLogEntry(speaker, original, translated) {
  const empty = meetingLog.querySelector('.log-empty');
  if (empty) empty.remove();

  const now = new Date();
  const time = now.toTimeString().slice(0, 8);
  const flag = speaker === 'kr' ? '🇰🇷' : '🇯🇵';

  S.log.push({ time, speaker, original, translated });

  const entry = document.createElement('div');
  entry.className = `log-entry ${speaker}-entry`;
  entry.innerHTML = `
    <span class="log-time">${time}</span>
    <span class="log-speaker">${flag}</span>
    <div class="log-text">
      <span class="log-original">${escHTML(original)}</span>
      <span class="log-arrow">→</span>
      <span class="log-translated">${escHTML(translated)}</span>
    </div>
  `;
  meetingLog.appendChild(entry);
  meetingLog.scrollTop = meetingLog.scrollHeight;
}

function copyLog() {
  if (!S.log.length) { showToast('복사할 로그가 없습니다', 'error'); return; }
  const text = S.log.map(l => {
    const flag = l.speaker === 'kr' ? 'KR' : 'JP';
    return `[${l.time}] ${flag}: ${l.original} → ${l.translated}`;
  }).join('\n');

  navigator.clipboard.writeText(text).then(() => {
    showToast('로그가 클립보드에 복사되었습니다', 'success');
  });
}

function clearLog() {
  S.log = [];
  meetingLog.innerHTML = '<div class="log-empty">미팅을 시작하면 대화 내역이 기록됩니다</div>';
}

// ===== UTILITIES =====
function escHTML(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg, type = 'error', duration = 4000) {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, duration);
}

// ===== EVENT LISTENERS =====
connectBtn.onclick = connectAPI;
apiKeyInput.onkeydown = (e) => { if (e.key === 'Enter') connectAPI(); };

micKR.onclick = () => toggleRec('kr');
micJP.onclick = () => toggleRec('jp');

voiceKRSel.onchange = () => { S.voiceKR = voiceKRSel.value; };
voiceJPSel.onchange = () => { S.voiceJP = voiceJPSel.value; };

$('stability').oninput = function() { S.stability = +this.value; $('stabilityVal').textContent = (+this.value).toFixed(2); };
$('similarity').oninput = function() { S.similarity = +this.value; $('similarityVal').textContent = (+this.value).toFixed(2); };

$('copyLogBtn').onclick = copyLog;
$('clearLogBtn').onclick = clearLog;

// ===== AUTO-CONNECT ON LOAD =====
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('wyyyes_api_key');
  if (saved) {
    apiKeyInput.value = saved;
    connectAPI();
  }
});
</script>
